<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社日亜パートナーズ | 公式サイト</title>
  <link rel="icon" type="image/svg+xml" href="vite.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="home">
  <header class="site-header site-header--home">
    <div class="site-header__inner site-header__inner--home">
      <a href="index.html" class="site-logo">
        <span class="site-logo__text">NICHIA PARTNERS, INC.</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="メニュー" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" aria-label="グローバルナビ">
        <a href="index.html" data-nav="home">HOME</a>
        <a href="business.html" data-nav="business">BUSINESS</a>
        <a href="about.html" data-nav="about">ABOUT US</a>
        <a href="contact.html" data-nav="contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main class="home-main">
    <section class="hero hero--home" aria-labelledby="hero-company-name hero-title-main">
      <div class="hero__media" aria-hidden="true">
        <video autoplay muted loop playsinline>
          <source src="media/hero-main.mp4" type="video/mp4">
        </video>
      </div>
      <div class="hero__overlay hero__overlay--home hero__overlay--sumitomo"></div>
      <div class="hero__center-stack wrap" aria-hidden="true">
        <p class="hero__company-name" id="hero-company-name">NICHIA PARTNERS, INC.</p>
      </div>
      <div class="hero__shell wrap" id="hero-copy">
        <div class="hero__copy-block" aria-hidden="true">
          <p class="hero__en">Trading &amp; Forest Resources</p>
          <h1 id="hero-title-main" class="hero__title-main">森と海、そして<br>ビジネスをつなぐ。</h1>
        </div>
        <nav class="hero__cards" aria-label="主なページ">
          <a href="business.html" class="hero-card">
            <span class="hero-card__en">Business</span>
            <span class="hero-card__ja">事業内容</span>
            <span class="hero-card__line" aria-hidden="true"></span>
          </a>
          <a href="about.html" class="hero-card">
            <span class="hero-card__en">About</span>
            <span class="hero-card__ja">会社概要</span>
            <span class="hero-card__line" aria-hidden="true"></span>
          </a>
          <a href="contact.html" class="hero-card">
            <span class="hero-card__en">Contact</span>
            <span class="hero-card__ja">お問い合わせ</span>
            <span class="hero-card__line" aria-hidden="true"></span>
          </a>
        </nav>
      </div>
    </section>
    <noscript>
      <style>
        .hero.hero--home {
          --home-scroll-reveal: 1 !important;
        }
        .hero.hero--home.hero--cards-visible .hero-card {
          opacity: 1 !important;
          transform: none !important;
        }
        .hero.hero--home .hero__overlay--home.hero__overlay--sumitomo::after {
          opacity: 1 !important;
        }
        .hero.hero--home .hero__cards {
          pointer-events: auto !important;
        }
        .hero.hero--home .hero__copy-block .hero__en,
        .hero.hero--home .hero__copy-block .hero__title-main {
          opacity: 1 !important;
          transform: none !important;
        }
        .hero.hero--home .hero__company-name {
          opacity: 1 !important;
          transform: none !important;
        }
        .hero.hero--home .hero__copy-block {
          pointer-events: auto !important;
        }
      </style>
    </noscript>
  </main>

  <button type="button" class="back-top" aria-label="ページ上部へ">↑</button>
  <script src="js/site.js"></script>
</body>
</html>
