<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 株式会社日亜パートナーズ</title>
  <link rel="icon" type="image/svg+xml" href="vite.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/site.css">
</head>
<body data-page="contact">
  <div class="fsc-corner" role="img" aria-label="FSC 認証">
    <img
      class="fsc-corner__img"
      src="media/fsc-logo.png"
      width="499"
      height="608"
      alt=""
      decoding="async"
      fetchpriority="low"
    >
  </div>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">
        <span class="site-logo__text">NICHIA PARTNERS, INC.</span>
      </a>
      <button type="button" class="nav-toggle" aria-label="メニュー" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" aria-label="グローバルナビ">
        <a href="index.html" data-nav="home">HOME</a>
        <a href="business.html" data-nav="business">BUSINESS</a>
        <a href="products.html" data-nav="products">PRODUCTS</a>
        <a href="about.html" data-nav="about">ABOUT US</a>
        <a href="contact.html" data-nav="contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <main>
    <header class="page-hero wrap page-hero--editorial fade-in">
      <p class="lead-en">Contact</p>
      <h1 class="reveal-heading">お問い合わせ</h1>
      <p class="sub">お問い合わせフォーム・所在地のご案内。</p>
    </header>

    <section class="section">
      <div class="wrap">
        <div class="fade-in panel panel--elevated contact-panel" id="contact" style="max-width:48rem; margin:0 auto;">
          <!--
            Netlify Forms: data-netlify="true" のフォームは Netlify にデプロイしたときに検知されます。
            ダッシュボード「Forms」で送信を確認し、通知メールの設定を行ってください。
          -->
          <h2 class="contact-section__title">お問い合わせフォーム</h2>
          <p class="contact-section__lead">
            下記より送信いただけます。後日、担当よりメールまたはお電話にてご連絡いたします。
          </p>
          <form
            class="contact-netlify-form"
            name="contact"
            method="POST"
            data-netlify="true"
            netlify-honeypot="bot-field"
            action="contact-thanks.html"
          >
            <input type="hidden" name="form-name" value="contact">
            <p class="contact-netlify-form__honeypot" aria-hidden="true">
              <label>この欄は空のままにしてください: <input name="bot-field" autocomplete="off" tabindex="-1"></label>
            </p>
            <div class="form-group">
              <label for="contact-name">お名前 <span aria-hidden="true">*</span></label>
              <input id="contact-name" type="text" name="name" required autocomplete="name" placeholder="山田 太郎">
            </div>
            <div class="form-group">
              <label for="contact-email">メールアドレス <span aria-hidden="true">*</span></label>
              <input id="contact-email" type="email" name="email" required autocomplete="email" placeholder="example@example.com">
            </div>
            <div class="form-group">
              <label for="contact-company">会社名</label>
              <input id="contact-company" type="text" name="company" autocomplete="organization">
            </div>
            <div class="form-group">
              <label for="contact-phone">電話番号</label>
              <input id="contact-phone" type="tel" name="phone" autocomplete="tel" placeholder="03-1234-5678">
            </div>
            <div class="form-group">
              <label for="contact-message">お問い合わせ内容 <span aria-hidden="true">*</span></label>
              <textarea id="contact-message" name="message" rows="6" required placeholder="お問い合わせ内容をご記入ください"></textarea>
            </div>
            <p style="margin: 0;">
              <button type="submit" class="btn btn--primary">送信する</button>
            </p>
          </form>

          <h2 class="contact-section__title contact-section__title--map">地図</h2>
          <div class="contact-map-wrap">
            <iframe
              title="株式会社日亜パートナーズ 所在地"
              class="contact-map"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen
              src="https://www.google.com/maps?q=%E6%9D%B1%E4%BA%AC%E9%83%BD%E5%8D%83%E4%BB%A3%E7%94%B0%E5%8C%BA%E4%B9%9D%E6%AE%B5%E5%8D%972%E4%B8%81%E7%9B%AE3%E7%95%AA22%E5%8F%B7&amp;z=18&amp;hl=ja&amp;output=embed"></iframe>
          </div>
          <p class="contact-map-link"><a href="https://www.google.com/maps?q=%E6%9D%B1%E4%BA%AC%E9%83%BD%E5%8D%83%E4%BB%A3%E7%94%B0%E5%8C%BA%E4%B9%9D%E6%AE%B5%E5%8D%972%E4%B8%81%E7%9B%AE3%E7%95%AA22%E5%8F%B7&amp;z=18&amp;hl=ja" target="_blank" rel="noopener noreferrer">大きな地図で見る（Google マップ）</a></p>
        </div>
      </div>
    </section>
  </main>

  <button type="button" class="back-top" aria-label="ページ上部へ">↑</button>
  <script src="js/site.js"></script>
</body>
</html>
